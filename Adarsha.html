<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adarsha Online Shopping</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
body{font-family:Arial;margin:0;padding:0}

/* header */
header{
  background:#031f50; position: fixed;width:100%;top:0;
}
.header1{
  width:1200px;margin: auto;display: flex;justify-content:space-between;color:white;
}
/* search */
#search{
  height:30px;margin-top:15px;
  padding:6px;
  width:600px;
}
.fa-list{
  font-size:27px;margin-top:27px;
}
.fa-magnifying-glass{
   display:none;
}
/* products */
.container{
  
  display:flex; max-width:1400px;margin: auto;
  flex-wrap:wrap;
  gap:10px;margin-top:70px;
  justify-content:center;
}

.product{
  width:200px;
  height:300px;
  border:1px solid #ccc;
  cursor:pointer;
  padding:5px;
}

.product img{
  width:100%;
  height:80%;
  object-fit:cover;
}

/* modal */
.modal{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

.modal-content{
  background:white;
  max-width:500px;
  margin:50px auto;
  padding:10px;
}
#back{
 float:right;cursor:pointer; color:red; font-size:30px;
}
.modal img{
  width:100%;
}
.thumbs img{
  width:60px;
  height:60px;
  cursor:pointer;
}
#pname{
  font-size:17px;font-weight:400;
}
#pcode{
  text-align: center; font-size:20px; color:red;
}
#ppieces,
#pprice{
  display:flex;
  justify-content:space-between;
  text-align:center;
}

#ppieces span,
#pprice span{
  width:33%;
}
#Obtn{
  width:40%;background: #031f50;height:30px;color:white;font-size:16px;font-weight:600;font-family: 'Poppins', sans-serif;border-radius:3px;
}
#Obtn1{
   width:40%;background: tomato;height:30px;color:white;font-size:16px;font-weight:600;font-family: 'Poppins', sans-serif;border:none;border-radius:3px;
}
h4{
  text-align: center;
}
/* modal */
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  overflow-y: auto; /* 👈 এই লাইনটি যুক্ত করুন */
}
@media(max-width:600px){
  .header1{
    width:100%;
  }
  h1{
    margin-left:4%;font-size:25px;
  }
  #search{display:none;
  }
  .fa-list{
      font-size:24px;margin-top:20px; margin-right:4%;
  }
  .fa-magnifying-glass{
   display:inline-block;font-size:23px;margin-top:20px;margin-left:35%;
}
#opensearchbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:60px;
  background:#031f50;
  display:none;
  z-index:9999;
}
#openseachbox{
 display: flex;
}
#ONEsearch{
  margin-left:7%;height:30px;width:80%;margin-top:10px;
}
#X{
  color:red;font-size:30px;margin-top:12px;margin-left:10px;
}
.product{
  width:45%;
  height:270px;
  border:1px solid #ccc;
  cursor:pointer;
  padding:5px;
}
#Obtn{
  width:40%;background: #031f50;height:30px;color:white;font-size:16px;font-weight:600;font-family: 'Poppins', sans-serif;border-radius:3px;
}
#Obtn1{
   width:40%;background: tomato;height:30px;color:white;font-size:16px;font-weight:600;font-family: 'Poppins', sans-serif;border:none;border-radius:3px;
}
}
</style>
</head>
<body>
<header>
  <div class="header1">
      <h1 onclick="loadProducts()">Adarsha</h1>
  <input id="search" placeholder="Search..." onkeyup="searchProduct()">
  <i class="fa-solid fa-magnifying-glass" onclick="searchicon()"></i>
  <i class="fa-solid fa-list" onclick="demo()"  id="list"></i>
  </div>
</header>
<div id="opensearchbox">
  <div id="openseachbox">
    <input id="ONEsearch" placeholder="Search..." onkeyup="searchProduct()"><p onclick="searchclose()" id="X">X</p>
  </div>
</div>
<!-- PRODUCTS -->
<div class="container" id="productList"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span onclick="closeModal()" id="back">X</span>

    <img id="mainImg">

    <div class="thumbs" id="thumbs"></div>

    <h3 id="pname"></h3>
    <p id="pcode"></p>
    <p id="ppieces"><span>pieces</span><span>pieces</span></p>
    <p id="pprice"><span>Price</span><span>180 TK</span></p>
    <button onclick="window.location='https://wa.me/8801614153820?text=Hello%20I%20want%20service', '_blank'" id="Obtn">Oder Now</button> <button onclick="window.location=''" id="Obtn1">Add To Cart</button>
    <h4>Details</h4><hr>
    <p id="pdetails"></p>
  </div>
</div>

<script>

/* ================= DATA ================= */
const products = [
{
id:1,
name:"Adjustable Back Strap",
code:"1010",
ppieces:["pieces 1-10","pieces 12-20","pieces 22-30"],
price:["180 TK", "100 TK","80 TK"],
images:["belt.webp","belt2.jpg","best3.webp"],
details:"best product ",
},
{
id:2,
name:"Water Bottle",
code:"0011",
ppieces:["pieces 1-10","pieces 12-20","pieces 22-30"],
price:["180 TK", "100 TK","80 TK"],
images:["bottol.jpg"],
details:"best price",
},
{
id:3,
name:"LCD Tablet",
code:"5050",
ppieces:["pieces 1-10","pieces 12-20","pieces 22-30"],
price:["180 TK", "100 TK","80 TK"],
images:["lcd table1.jpg","lcd table2.jpg"],
details:" aaaaaaaaaaaaaaa",
},
{
id:4,
name:"LCD Tablet",
code:"5050",
ppieces:["pieces 1-10","pieces 12-20","pieces 22-30"],
price:["180 TK", "100 TK","80 TK"],
images:["200headphone2.webp","200hheadphon1.webp"],
details:" aaaaaaaaaaaaaaa",
},
{
id:5,
name:"LCD Tablet",
code:"5050",
ppieces:["pieces 1-10","pieces 12-20","pieces 22-30"],
price:["180 TK", "100 TK","80 TK"],
images:["3pcp.png","3pcy.png"],
details:" aaaaaaaaaaaaaaa",
},
{
id:6,
name:"Headphon",
code:"5050",
ppieces:["pieces 1-10","pieces 12-20","pieces 22-50"],
price:["180 TK", "100 TK","80 TK"],
images:["appleheadphon.jpg","appleheadphon2.jpg"],
details:"bbbbbbbbbb",
},
{
id:7,
name:"whatch",
code:"5050",
ppieces:["pieces 1-10","pieces 12-20","pieces 22-50"],
price:["180 TK", "100 TK","80 TK"],
images:["whtch1.jpg","watch2.jpg","watch3.jpg"],
details:"bbbbbbbbbb",
},
{
id:8,
name:"whatch",
code:"5050",
ppieces:["pieces 1-10","pieces 12-20","pieces 22-50"],
price:["180 TK", "100 TK","80 TK"],
images:["two130.png","two150.png",""],
details:"bbbbbbbbbb",
}
];

/* ================= LOAD PRODUCTS ================= */
function loadProducts(){
let box = document.getElementById("productList");
box.innerHTML="";

products.forEach(p=>{
box.innerHTML += `
<div class="product" onclick="openModal(${p.id})">
<img src="${p.images[0]}">
<p>${p.name}</p>
</div>
`;
});
}

loadProducts();

/* ================= MODAL ================= */
function openModal(id){
let p = products.find(x=>x.id===id);

document.getElementById("modal").style.display="block";
document.getElementById("mainImg").src=p.images[0];
document.getElementById("pname").innerText=p.name;
document.getElementById("pcode").innerText="Code: "+p.code;
document.getElementById("ppieces").innerHTML =p.ppieces.map(x => `<span>${x}</span>`).join("");
document.getElementById("pprice").innerHTML =p.price.map(x => `<span>${x}</span>`).join("");
document.getElementById("pdetails").innerText=p.details;
let thumbs=document.getElementById("thumbs");
thumbs.innerHTML="";

p.images.forEach(img=>{
thumbs.innerHTML+=`
<img src="${img}" onclick="document.getElementById('mainImg').src='${img}'">
`;
});
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

/* ================= SEARCH ================= */
function searchProduct(){

let input1 = document.getElementById("search").value.toLowerCase();
let input2 = document.getElementById("ONEsearch").value.toLowerCase();

let input = input1 || input2;

let items = document.querySelectorAll(".product");

items.forEach(item=>{
if(item.innerText.toLowerCase().includes(input)){
item.style.display="block";
}else{
item.style.display="none";
}
});

}

/* ================= search icon open ================= */
function searchicon(){
  document.getElementById("opensearchbox").style.display = "block";
}
function searchclose(){
  document.getElementById("opensearchbox").style.display = "none";
}
</script>
</body>
</html>
