 body{

.profile-box{

   border:none; margin-left:30px; font-weight:900;

p{
   margin-left:30px; font-weight:900;

 #postBox{
   margin: auto; max-width:800px;

 display:none;margin-top:10px; background:rgb(226, 221, 221);
 text-align: center;

.fa-xmark{

        position:fixed;

     }

    list-style: none;

     background:rgb(71, 147, 71);border:none;color:white;font-size:18px; border-radius:5px;

     width:200px;

     background:rgb(71, 147, 71);border:none;color:white;font-size:18px; border-radius:5px;

    width:47%;height:280px; border:1px solid rgb(150, 143, 143); margin:5px;

<body>
     <div class="header">
   <div id="head">
    <span style="margin-top:20px;">ABCD</span>
   <input type="text" id="searchBox" placeholder=" Search you products">
     <i class="fa-solid fa-list" id="list"></i>
        <div id="topMenu">
            <ul>

                <i class="fa-solid fa-xmark" onclick="window.location.href=''"></i><br>
                <li onclick="window.location.href='login.html'">Login</li>
                <li onclick="window.location.href='https://wa.me/8801319992654?text=Hi!%20I%20want%20to%20chat%20with%20you'">Chat</li>
                <li onclick="window.location.href='gift.html'">Gift</li>
                <li>Setting</li>
                <li onclick="window.location.href='market.html'">job</li>
            </ul>
        </div>
   </div>
    <div class="btn">
     <button onclick="window.location.href='index.html'" class="bttn"> HOME </button>   
     <button onclick="window.location.href='Reels.html'" class="bttn"> Reels </button>
    <button onclick="window.location.href='game.html'" class="bttn"> GAME </button>
    <button onclick="window.location. href='ID.html'" class="bttn"> ID </button>
   </div>
   </div><br><br><br><br><br>
    <div class="profile-box" id="profileBox">
    <img id="profileImage" src="default.png" alt="Profile">
    <input type="file" id="fileInput" accept="image/*" hidden>
</div><br>
  <p id="showName">Your Name</p>
     <button id="count">0</button>  <button id="like">like</button>
  <br><br>
 <button id="chat">Chat</button>
  <br><br>
 <button id="btnbig"> What's on your mind </button>

<div id="postBox">
     <i class="fa-solid fa-xmark" onclick="window.location.href=''"></i><br><br>
      
    
     <input id="pName" type="text" placeholder="Product - Name"><br><br>
<input id="pPrice" type="text" placeholder="Product - price"><br><br>
<input id="pCategory" type="text" placeholder="Category"><br><br>
<input id="pLocation" type="text" placeholder="Location"><br><br>
<input id="pCondition" type="text" placeholder="Condition"><br><br>
<input id="pBrand" type="text" placeholder="Brand"><br><br>
<input id="pModel" type="text" placeholder="Model"><br><br>
<input id="pColor" type="text" placeholder="Color"><br><br>
        
    <input type="text" id="textInput" placeholder=" Description" style="width:90%; height:80px;">
    <label style="cursor:pointer; margin-right:0; font-size:20px;"><br>
        <input type="file" id="imgUpload" accept="image/*" style="display:none;">
        📷 
    </label>
       <!-- Video Upload -->
    <label style="cursor:pointer;">
        <input type="file" id="videoUpload" accept="video/*" style="display:none;">
        🎥
    </label><br><br>

    <button id="save">Save</button>
</div>

<br>


<script>
  
    const fileInput = document.getElementById("fileInput");
    const profileImage = document.getElementById("profileImage");
    const profileBox = document.getElementById("profileBox");

    let count = document.getElementById("count");
    let likeBtn = document.getElementById("like");

    let imgUpload = document.getElementById("imgUpload");
    let videoUpload = document.getElementById("videoUpload");
    let previewBox = document.getElementById("previewBox");

    // ---------------------------
    // IMAGE PREVIEW
    // ---------------------------
    imgUpload.addEventListener("change", function () {
        let file = imgUpload.files[0];
        if (file) {
            let reader = new FileReader();
            reader.onload = function (e) {
                previewBox.style.display = "block";
                previewBox.innerHTML = `
                    <img src="${e.target.result}" style="width:100%;">
                `;
            };
            reader.readAsDataURL(file);
        }
    });

    // ---------------------------
    // VIDEO PREVIEW
    // ---------------------------
    videoUpload.addEventListener("change", function () {
        let file = videoUpload.files[0];
        if (file) {
            let videoURL = URL.createObjectURL(file);
            previewBox.style.display = "block";
            previewBox.innerHTML = `
                <video width="250" controls>
                    <source src="${videoURL}" type="video/mp4">
                </video>
            `;
        }
    });

    // ---------------------------
    // LOAD SAVED PROFILE IMAGE
    // ---------------------------
    const savedImage = localStorage.getItem("myProfile");
    if (savedImage) {
        profileImage.src = savedImage;
    }

    // Click on image → open file picker
    profileBox.addEventListener("click", () => {
        fileInput.click();
    });

    // Save new profile image
    fileInput.addEventListener("change", () => {
        const file = fileInput.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                profileImage.src = e.target.result;
                localStorage.setItem("myProfile", e.target.result);
            };
            reader.readAsDataURL(file);
        }
    });

    // ---------------------------
    // LIKE BUTTON COLOR
    // ---------------------------
    likeBtn.addEventListener("click", () => {
        likeBtn.style.backgroundColor = "tomato";
        likeBtn.style.color = "white";
    });

    // ---------------------------
    // LIKE COUNTER SAVE
    // ---------------------------
    let savedCount = localStorage.getItem("likeCount");
    if (savedCount) {
        count.textContent = savedCount;
    }

    likeBtn.addEventListener("click", () => {
        let current = parseInt(count.textContent);
        current += 1;
        count.textContent = current;

        localStorage.setItem("likeCount", current);
    });

    // ---------------------------
    // POST BOX TOGGLE
    // ---------------------------
    document.getElementById("btnbig").addEventListener("click", function () {
        let box = document.getElementById("postBox");

        box.style.display = (box.style.display === "none" || box.style.display === "") 
                            ? "block" 
                            : "none";
    });

    // ---------------------------
    // list icon click
listBtn.addEventListener("click",(e) => {
    e.stopPropagation(); // important
    if(!status){
        topMenu.style.top = "0";
        status = true;
    } else {
        topMenu.style.top = "-300px";
        status = false;
    }
});

// outside click = menu close
document.addEventListener("click",(e) => {
    if(status && !topMenu.contains(e.target) && e.target !== listBtn){
        topMenu.style.top = "-300px";
        status = false;
    }
});

    // ---------------------------
    // LOAD NAME
    // ---------------------------
    let savedName = localStorage.getItem("savedName");
    if (savedName) {
        document.getElementById("showName").textContent = savedName;
    } 



    // SAVE uploaded IMAGE for REELS page
imgUpload.addEventListener("change", function () {
    let file = imgUpload.files[0];
    if (file) {
        let reader = new FileReader();
        reader.onload = function (e) {
            localStorage.setItem("postImage", e.target.result); // SAVE IMAGE
        };
        reader.readAsDataURL(file);
    }
});

// SAVE uploaded VIDEO for REELS page
videoUpload.addEventListener("change", function () {
    let file = videoUpload.files[0];
    if (file) {
        let videoURL = URL.createObjectURL(file);
        localStorage.setItem("postVideo", videoURL); // SAVE VIDEO
    }
});


</script>
</body>
</html>
