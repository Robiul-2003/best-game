<!DOCTYPE html>

<style>
    body{

    }

       margin-top:15px;font-size:22px;
        cursor: pointer; 
     }
     .vedi{
        
        max-width:800px;

     }
     img{
        margin-left:10px;
       
        width:35px;

     }
     #likeReels{ 
        margin-left:10px;
        width:40px;
        height:25px;
        border:1px solid tomato; text-align: center;border-radius:7px; line-height:23px;
        
     }
     .fa-thumbs-up{
        margin-left:90%;font-size:30px;
     }
     .fa-comment{
        margin-left:90%;font-size:30px; margin-top:20px;
     }
     .fa-share{
        margin-left:90%;font-size:30px;margin-top:20px;
     }
     #showName{
     
      margin-left:5px; font-size:20px;
     }
     .fa-xmark{
    color:red;
    font-size:25px;
    margin-left:70%;
}
#topMenu{
        position:fixed;
        top:-300px;
    width:50%;
    background:white;
    color: white;
    padding:0px;
    transition: 0.4s;
    z-index: 999;
    margin-left:50%; color:black;
     }
     #topMenu ul li{
    list-style: none;
    padding: 10px 0;
    border-bottom: 1px solid gray;
    cursor: pointer; 
}
</style>
<body>
     <div class="header">
   <div id="head">
    <p>ABCD</p>
   <input type="text" id="searchBox" placeholder=" Search you products">
     <i class="fa-solid fa-list" id="list"></i>
        <div id="topMenu">
            <ul>

                <i class="fa-solid fa-xmark" onclick="window.location.href=''"></i><br>
                <li onclick="window.location.href='login.html'">Login</li>
                <li onclick="window.location.href='https://wa.me/8801319992654?text=Hi!%20I%20want%20to%20chat%20with%20you'">Chat</li>
                <li onclick="window.location.href='gift.html'">Gift</li>
                <li>Setting</li>
                <li onclick="window.location.href='market.html'">job</li>
            </ul>
        </div>
   </div>
    <div class="btn">
     <button  class="bttn" onclick="window.location.href='index.html'"> HOME </button>   
     <button  class="bttn" onclick="window.location.href=''"> Reels </button>
    <button  class="bttn"  onclick="window.location.href='index.html'"> GAME </button>
    <button  class="bttn"  onclick="window.location.href='ID.html'"> ID</button>
   </div>
   </div><br><br><br><br><br>
   <div class="vedi">
    <i class="fa-regular fa-thumbs-up"></i><br> <i class="fa-regular fa-comment"></i><br> <i class="fa-solid fa-share"></i>
   <div class="soja" style="display: flex;">
    <img id="reelsProfile" src="" onclick="window.location.href='ID.html'"> <p id="showName" onclick="window.location.href='ID.html'">Your Name</p> <p id="likeReels">Like</p>
   </div>
   </div>

   <script>
// list icon
const listBtn = document.getElementById("list");
const topMenu = document.getElementById("topMenu");

listBtn.addEventListener("click",() => {
    if(!status){
        topMenu.style.top = "0";
        status = true;
    } else {
        topMenu.style.top = "-300px";
        status = false;
    }
});
      // Namge save
      let savedName = localStorage.getItem("savedName");
if (savedName) {
    document.getElementById("showName").textContent = savedName;
}
//like button color
let likeBtn = document.getElementById("likeReels");

likeBtn.addEventListener("click", () => {
    // শুধু background color change হবে
    likeBtn.style.backgroundColor = "tomato";
    likeBtn.style.color = "white"; // optional, text color change
});

// Load saved profile image on Reels Page
let savedProfile = localStorage.getItem("myProfile");

if (savedProfile) {
    document.getElementById("reelsProfile").src = savedProfile;
}




// img / vedio show
let postImage = localStorage.getItem("postImage");
let postVideo = localStorage.getItem("postVideo");

let vediBox = document.querySelector(".vedi");

// If image exists
if (postImage) {
    let img = document.createElement("img");
    img.src = postImage;
    img.style.width = "100%";
    img.style.height = "520px";
    img.style.marginTop = "0";
    img.style.objectFit = "cover";

    // add image at top
    vediBox.prepend(img);
}

// If video exists
if (postVideo) {
    let video = document.createElement("video");
    video.controls = true;
    video.width = "100%";
    video.innerHTML = `<source src="${postVideo}" type="video/mp4">`;

    vediBox.prepend(video);
}
   </script>
</body>
</html>
