<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift</title>
</head>
<style>
    body{
        background:rgb(211, 206, 206);
    }
    h1{
        text-align: center;
    }
    
     .slider{
      max-width:1000px;
      height:150px;
      margin: auto;
      overflow: hidden;
     }
     .sliders{
      display: flex;
      transition: 0.5s;
     }
     .sliders img{
      width:100%;
      height:150px;
      flex-shrink:0;
     }
     button{
        margin-left:40%;
        width:150px;
        height:30px; background:skyblue;
     }
    
</style>
<body>

    <h1 id="showCoin">You Coin - </h1>
      <div class="slider">
     <div class="sliders">
      <img src="amazon.png">
     <img src="bkash.png">
     <img src="nagad.png">
     </div>
    </div>
  <br>
  <div class="box" style="max-width:800px;height:300px; border:1px solid rgb(176, 168, 168); margin:auto; display: flex;">
  <div class="ig"  style="width:50%;height:300px;">
     <img src="cap.png"  style="width:100%; height:300px;">
  </div>
   <div class="tit">
    <h2>coin - 500</h2>
    <button>click</button>
   </div>
  </div>
    <script>
        // img slider 
        let index = 0 ;
let slides = document.querySelector(".sliders");
let total = document.querySelectorAll(".sliders img").length;

function autoSlide(){
  index++;
  if(index >= total){
    index  = 0 ;
  }
  slides.style.transform = "translateX("+(-index * 100) +"%)";

}
setInterval(autoSlide,2000);

  // coin load from localStorage
    let savedCoin = localStorage.getItem("coin") || 0;
    document.getElementById("showCoin").innerText = "You Coin - " + savedCoin;
    </script>
</body>
</html>
