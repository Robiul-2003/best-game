<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title> ROBI </title>
</head>
<style>
 body{ 
    background:rgb(245, 238, 238);
}
  .header{
        width:100%;
        height:85px;
        background:tomato;
        overflow:hidden;
       position: fixed;
       top:0;
       left:0;
    }
    #head{
        display: flex;
        justify-content: space-around;
    }
    input{
        margin-top:5px;
        width:70%;
        height:40px;
        border-radius:8px; border:none;
    }
    .btn{
       
        display: flex;
    }
    .bttn{
        margin-top:5px;
          width:50%;
         height:35px;
        
    }
     #list{
        margin-top:15px;
     }
   
.profile-box{
   
    text-align: center;
    display: inline-block;
    padding:10px;
    border-radius: 25px;
    cursor: pointer;
}
#profileImage{
    
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid red;
}

</style>
<body>
     <div class="header">
   <div id="head">
    <p>Robi</p>
   <input type="text" id="searchBox" placeholder=" Search you products">
     <i class="fa-solid fa-list" id="list"></i>
   
   </div>
    <div class="btn">
     <button onclick="window.location.href='Shop.html'" class="bttn"> HOME </button>   
     <button onclick="window.location.href='Reels.html'" class="bttn"> Reels </button>
    <button onclick="window.location.href='index.html'" class="bttn"> GAME </button>
    <button onclick="window.location. href='gift.html'" class="bttn"> ID </button>
   </div>
   </div><br><br><br><br><br>
    <div class="profile-box" id="profileBox">
    <img id="profileImage" src="default.png" alt="Profile">
    <input type="file" id="fileInput" accept="image/*" hidden>
</div>
<script>
    const fileInput = document.getElementById("fileInput");
const profileImage = document.getElementById("profileImage");
const saveBtn = document.getElementById("profileBox");

// Load saved image
const savedImage = localStorage.getItem("myProfile");
if (savedImage) {
    profileImage.src = savedImage;
}

// Click on border → open file picker
profileBox.addEventListener("click", () => {
    fileInput.click();
});

// Auto preview + auto save to localStorage
fileInput.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            profileImage.src = e.target.result;
            localStorage.setItem("myProfile", e.target.result);
        };
        reader.readAsDataURL(file);
    }
});
</script>
</body>
</html>
