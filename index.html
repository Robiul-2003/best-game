<script>
let status = false;

const listBtn = document.getElementById("list");
const topMenu = document.getElementById("topMenu");

// list icon click
listBtn.addEventListener("click",(e) => {
    e.stopPropagation(); // important
    if(!status){
        topMenu.style.top = "0";
        status = true;
    } else {
        topMenu.style.top = "-300px";
        status = false;
    }
});

// outside click = menu close
document.addEventListener("click",(e) => {
    if(status && !topMenu.contains(e.target) && e.target !== listBtn){
        topMenu.style.top = "-300px";
        status = false;
    }
});
// search box
let searchBox = document.getElementById("searchBox");
searchBox.addEventListener("keyup", function () {
    let value = searchBox.value.toLowerCase();
    let products = document.querySelectorAll(".product");

    products.forEach(function (product) {
        let name = product.innerText.toLowerCase(); // 👈 change here

        if (name.includes(value)) {
            product.style.display = "block";
        } else {
            product.style.display = "none";
        }
    });
});
// 2page show product
function viewProduct(name, price, image){
    let product = {
        name: name,
        price: price,
        image: image
    };
    localStorage.setItem("product", JSON.stringify(product));
    window.location.href = "product.html";
}

//button color 
const buttons = document.querySelectorAll(".bttn");

buttons.forEach(bttn => {
    bttn.addEventListener("click", () => {

        // active color remove
        buttons.forEach(b => b.classList.remove("active"));

        // clicked button color add
        bttn.classList.add("active");

        // page redirect
        const link = bttn.getAttribute("data-link");
        if (link) {
            setTimeout(() => {
                window.location.href = link;
            }, 150); // ছোট delay যাতে color দেখা যায়
        }
    });
});
