<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Game</title>
</head>
<style>
    body{
        background:rgb(64, 62, 62);
        overflow: hidden;
    }
    .box{
        width:100%;
        height:250px;
        background:black; 
      
    }
    .one{
        display: flex;
    }
    .fa-person-running{
        font-size:35px;
        color:white;
          margin-top:160px;
          margin-left:20px;
          position:relative;  
    }
     .fa-star{
      color:red;   
      font-size:20px;
        margin-top:180px;  
          margin-left:85%;
      animation: col  2s linear infinite;
     }
     @keyframes col{
        from{
             transform: translateX(0px) rotate(0deg)
        ;}
        to{
           transform: translateX(-1000px) rotate(1000deg);
        }
     }
     p{
        color:white; padding-left:10px; padding-right:20px;
     }
     .shoja{
      display: flex; justify-content: space-between;
     }
     .fa-coins{
      margin-left:85%;
  color: gold;
  font-size:20px;
  margin-top:180px;
  animation: coinMove 5s linear infinite;
}

@keyframes coinMove{
  from{transform: translateX(0px);}
  to{transform: translateX(-1000px);}
}
   
   
   
     .slider{
      width:50%;
      height:120px;
      margin: auto;
      overflow: hidden;
     }
     .sliders{
      display: flex;
      transition: 0.5s;
     }
     .sliders img{
      width:100%;
      height:120px;
      flex-shrink:0;
     }
</style>
<body>
    <div class="box">
       <div class="shoja">
         <p id="count"> Score - 0 </p> <p id="coinText">Coin - 0</p>
       </div>
   <div class="one">
        <i class="fa-solid fa-person-running" id="man"></i>
        <audio id="sound" src="click.mp3"></audio>

      <i class="fa-solid fa-coins" id="coin"></i>
       <i class="fa-solid fa-star" id="star"></i>
   </div>
    </div><br>
    <div class="slider">
     <div class="sliders">
      <img src="amazon.png">
     <img src="bkash.png">
     <img src="nagad.png">
     </div>
    </div>
    <script>
   let man = document.getElementById("man");
   let star = document.getElementById("star");
   let coin = document.getElementById("coin");
   let count = 0 ;
   let countText = document.getElementById("count");
   let coinCount = 0;
   let coinText = document.getElementById("coinText");
let canTakeCoin = true;

setInterval(function(){
  let manRect = man.getBoundingClientRect();
  let coinRect = coin.getBoundingClientRect();

  if(
    canTakeCoin &&
    manRect.right > coinRect.left &&
    manRect.left < coinRect.right &&
    manRect.bottom > coinRect.top &&
    manRect.top < coinRect.bottom
  ){
    coinCount++;
    coinText.innerText = "Coin - " + coinCount;

    canTakeCoin = false;
    coin.style.display = "none";

    setTimeout(function(){
      coin.style.display = "block";
      canTakeCoin = true;
    },2000);
  }
},50);


 function jump(){
    count ++;
    countText.innerText = "Score - " + count;
    // 🔊 sound play
    let sound = document.getElementById("sound");
    sound.currentTime = 0; // আবার শুরু থেকে বাজবে
    sound.play();
    man.style.top = "-100px";   // up
    man.style.left = "50px";
    setTimeout(function(){
      man.style.top = "0px";    // down
      man.style.left = "0px";
    },200);
  }

// PC space key
document.addEventListener("keydown", function(e){
  if(e.code === "Space"){
    e.preventDefault();
    jump();
  }
});
// Phone touch
document.addEventListener("touchstart", function(){
  jump();
});
document.addEventListener("touchstart", function(){
  let sound = document.getElementById("sound");
  sound.play();
}, { once: true });
//collision check

setInterval(function(){
  let manRect = man.getBoundingClientRect();
  let starRect = star.getBoundingClientRect();

  if(   
manRect.right > starRect.left &&
manRect.left < starRect.right &&
manRect.bottom > starRect.top && 
manRect.top < starRect.bottom

  ){
    // গেম শেষ হলে score save করো
    localStorage.setItem("score", count);
   
   window.location.href="test.html";
  }
},50);

let index = 0 ;
let slides = document.querySelector(".sliders");
let total = document.querySelectorAll(".sliders img").length;

function autoSlide(){
  index++;
  if(index >= total){
    index  = 0 ;
  }
  slides.style.transform = "translateX("+(-index * 100) +"%)";

}
setInterval(autoSlide,2000);


          document.getElementById("man").addEventListener("click",function(){
            document.getElementById("sound").play();
          });
</script>
</body>
</html>
