<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Game2</title>
</head>
<style>
    body{
        background:rgb(64, 62, 62);
    }
    .box{
        width:100%;
        height:250px;
        background:black;
    }
    .one{
        display: flex;
    }
    .fa-person-running{
        font-size:35px;
        color:white;
          margin-top:160px;
          margin-left:20px;
          position: relative;
          
    }
    
     .fa-tree{
      color:white;   
      font-size:20px;
        margin-top:180px;
      margin-left:85%;
      animation: col  1s infinite;
     }
     @keyframes col{
        from{transform: translateX(10px);}
        to{transform: translateX(-550px);}
     }
     p{
        color:white; padding-left:10px; padding-right:20px;
     }
     .shoja{
      display: flex; justify-content: space-between;
     }
</style>
<body>
    <div class="box">
       <div class="shoja">
         <p id="count"> Score - 0 </p> <p id="height"> Height - 0</p>
       </div>
   <div class="one">
        <i class="fa-solid fa-person-running" id="man"></i>
       
      <i class="fa-solid fa-tree" id="tree"></i>
   </div>
    </div>

    <script>
   let man = document.getElementById("man");
   let tree = document.getElementById("tree");
   let count = 0 ;
   let countText = document.getElementById("count");
   let heightText = document.getElementById("height");
   
   let height = 0;

 function jump(){
  
    count ++;
    countText.innerText = "Score - " + count;
   
    if(count >  height){
      height = count;
      heightText.innerText = "Height - " + height;
    }
     
    man.style.top = "-100px";   // up
    man.style.left = "50px";
    setTimeout(function(){
      man.style.top = "0px";    // down
      man.style.left = "0px";
    },200);
  }

// PC space key
document.addEventListener("keydown", function(e){
  if(e.code === "Space"){
    jump();
  }
});
// Phone touch
document.addEventListener("touchstart", function(){
  jump();
});
//collision check

setInterval(function(){
  let manRect = man.getBoundingClientRect();
  let treeRect = tree.getBoundingClientRect();

  if(
  manRect.right > treeRect.left &&
manRect.left < treeRect.right &&
manRect.bottom > treeRect.top &&
manRect.top < treeRect.bottom

  ){
    // গেম শেষ হলে score save করো
    localStorage.setItem("score", count);

     window.location.href="test.html";
  }
},50);
    </script>
</body>
</html>
