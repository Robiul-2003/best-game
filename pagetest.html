<!DOCTYPE html>
<html>
<head>
  <title>Cricket Game</title>
</head>
<body style="text-align:center; background:black; color:white;">

<h1>🏏 Cricket Game</h1>
<p id="result">Click to play</p>

<button onclick="play()">Play Shot</button>

<script>
function play(){
  let run = Math.floor(Math.random()*7); // 0-6 runs

  if(run === 0){
    document.getElementById("result").innerText = "OUT 😢";
  } else {
    document.getElementById("result").innerText = "You scored: " + run + " runs";
  }
}
</script>

</body>
</html>
