<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Game</title>
</head>
<style>
    body{
        background:black;overflow: hidden;
    }
    span{
        color:rgb(219, 148, 15);
    }
   
    #box{
        width:250px;
        height:200px;
        margin: auto;border-radius:15px;
        background:rgb(42, 42, 98); 
    }
  #res{
    margin:20px auto;
    background:green;
    border:none;
    width:150px;
    height:35px;border-radius:5px;
    display: block;margin: auto;
   }
    #give{
    margin:20px auto;
    background:rgb(162, 162, 41);
    border:none;
    width:150px;
    height:35px;border-radius:5px;
    display: block;margin: auto;
   }
   #icon{
    display: flex;margin-top:24%;
    justify-content: center;gap:50px;
   }
   .fa-shop,
   .fa-link,
   .fa-share{
    color:white;
    font-size:30px;
    
   }
   #number{
    color:white;text-align: center;  font-size: 55px; 
   }
   .slider{
     margin: auto;
     width:80%;
     overflow: hidden;
    margin-top:20%;
   }
   .sliders{
    
    display: flex; 
    transition:0 .5s;
   }
   .sliders img{
    width:100%;
    height:60px;
    flex-shrink:0;
   }
</style>
<body>
    <span onclick="window.location.href='game.html'";><i class="fa-solid fa-angle-left"></i> HOME </span>
    <div id="box">
        <p id="number"> 0 <br> Score </p> 
        
    </div><br>
    <button onclick="window.location.href='gift.html'" id="give"> GIFT </button><br>
 <button onclick="window.location.href='game2.html'" id="res"> RESTART </button>
<div id="icon"> 
 <i class="fa-solid fa-shop" onclick="window.location.href='index.html'"></i> <i class="fa-solid fa-link"></i> <i class="fa-solid fa-share" onclick="sharePage()"></i>
</div><br><br>
<div class="slider">
  <div class="sliders">
    <img src="amazon.png">
    <img src="nagad.png">
    <img src="bkash.png">
  </div>
</div>

<script>
function sharePage(){
  if(navigator.share){
    navigator.share({
      title: "My Game",
      text: "Play my game!",
      url: window.location.href
    });
  }else{
    alert("Share not supported in this browser");
  }
}
let score = localStorage.getItem("score");

if(score == null){
score = 0;
}
document.getElementById("number").innerHTML = score + "<br>Score";

let index = 0 ;
let slides = document.querySelector(".sliders");
let total = document.querySelectorAll(".sliders img").length;

function autoSlide(){
  index++;
  if(index >= total){
    index  = 0 ;
  }
  slides.style.transform = "translateX("+(-index * 100) +"%)";

}
setInterval(autoSlide,2000);
</script>
</body>
</html>
