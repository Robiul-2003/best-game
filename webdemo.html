<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adarsha Agent</title>
  <link rel="icon" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter', sans-serif;
    }

    body{
      background:#f6f7fb;
      color:#111;
    }

    /* HEADER */
    .hero{
      max-width:1200px;
      margin:auto;
      padding:40px 20px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:30px;
    }

    .hero-text{
      flex:1;
    }

    .hero-text h1{
      font-size:42px;
      font-weight:700;
      line-height:1.2;
    }

    .hero-text p{
      margin-top:15px;
      color:#555;
      font-size:16px;
      line-height:1.6;
    }

    .search-box{
      margin-top:20px;
      position:relative;
      max-width:450px;
    }

    .search-box input{
      width:100%;
      padding:14px 45px 14px 15px;
      border-radius:10px;
      border:1px solid #ddd;
      outline:none;
      font-size:15px;
    }

    .search-box i{
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      color:#777;
    }

    .hero-img{
      flex:1;
      text-align:right;
    }

    .hero-img img{
      max-width:100%;
      height:320px;
      object-fit:contain;
    }

    /* CARDS */
    .container{
      max-width:1200px;
      margin:auto;
      padding:20px;
    }

    .grid{
      display:grid;
       display: flex;flex-wrap: wrap;
      gap:20px;
    }

    .card{
      background:#fff;
      border-radius:15px;width:32%;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      cursor:pointer;
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card img{
      width:100%;
      height:90%;
      object-fit:cover;
    }

    .card-body{
      padding:15px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .tag{
      font-size:14px;
      font-weight:500;
    }

    .price{
      font-size:14px;
      color:green;
      font-weight:600;
    }
   #searchboxope{
  display:none;
  position:absolute;
  width:100%;
  max-width:450px;
  background:white;
  border:1px solid #ddd;
  border-radius:10px;
  margin-top:490px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  z-index:999;
}

#sbo{
  width:100%;
  padding:10px;
}

#sbo p{
  padding:12px;
  cursor:pointer;text-align: justify;
  border-radius:5px;
  transition:0.2s;
}

#sbo p:hover{
  background:#f1f1f1;
}

.close-btn{
  color:red;
  margin-left:90%;
}
.fa-angle-left{
   font-size:30px;margin-left:20%;margin-top:30px;
}
    /* RESPONSIVE */
    @media(max-width:768px){
      .hero{
        flex-direction:column;
        text-align:center;
      }

      .hero-img{
        display:none;
      }

      .hero-text h1{
        font-size:30px;
      }
       .card{
      background:#fff;
      border-radius:15px;width:100%;
      overflow:hidden;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      cursor:pointer;
      transition:0.3s;
    }
       #searchboxope{
  display:none;
  position:absolute;
  width:90%;
  max-width:450px;
  background:white;
  border:1px solid #ddd;
  border-radius:10px;
  margin-top:250px;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
  z-index:999;
}
.fa-angle-left{
   font-size:20px;margin:20px;
}
    }
  </style>
</head>
<body>
     <i class="fa-solid fa-angle-left" onclick="window.location.href='index.html'"></i>
  <!-- HERO -->
  <section class="hero">
    <div class="hero-text">
      <h1>Discover Top Designers & Projects</h1>
      <p>Explore modern websites, e-commerce, vlog and webflow projects built for your next business idea.</p>

      <div class="search-box">
       <input type="text" id="searchInput" onkeyup="searchSite()" onclick="searchboxone()" placeholder="Search designers or categories...">
        <i class="fa-solid fa-magnifying-glass"></i>
      </div>
    </div>
<div id="searchboxope">
   <div id="sbo">
      <p onclick="searchboxclose()" class="close-btn">X</p>
      <p onclick="selectSearch('E-commerce')">E-commerce</p>
      <p onclick="selectSearch('vlog')">vlog</p>
      <p onclick="selectSearch('News')">News</p>
      <p onclick="selectSearch('protfolio')">protfolio</p>
   </div>
</div>
    <div class="hero-img">
      <img src="logo.png" alt="logo">
    </div>
  </section>
  <!-- CARDS -->
  <section class="container">
    <div class="grid">

      <div class="card" onclick="location.href='https://robiul-2003.github.io/Trinokabbo/'">
        <img src="trinokabbo.png">
        <div class="card-body">
          <span class="tag">E-commerce</span>
          <span class="price">Free</span>
        </div>
      </div>

      <div class="card" onclick="location.href='https://robiul-2003.github.io/web-developer/'">
        <img src="link1.png">
        <div class="card-body">
          <span class="tag">Vlog</span>
          <span class="price">Free</span>
        </div>
      </div>

      <div class="card" onclick="location.href='https://robiul-2003.github.io/robiul-pro/'">
        <img src="weblogo.png">
        <div class="card-body">
          <span class="tag">Webflow</span>
          <span class="price">Free</span>
        </div>
      </div>

      <div class="card" onclick="location.href=''">
        <img src="logo.png">
        <div class="card-body">
          <span class="tag">logo</span>
          <span class="price">Free</span>
        </div>
      </div>
      <div class="card" onclick="location.href=''">
        <img src="lcd table1.jpg">
        <div class="card-body">
          <span class="tag">fore</span>
          <span class="price">Free</span>
        </div>
      </div>

    </div>
  </section>
<script>
function searchSite() {
  let input = document.getElementById("searchInput").value.toLowerCase();
  let cards = document.getElementsByClassName("card");

  for (let i = 0; i < cards.length; i++) {
    let text = cards[i].innerText.toLowerCase();

    if (text.includes(input)) {
      cards[i].style.display = "block";
    } else {
      cards[i].style.display = "none";
    }
  }
}

function searchboxone(){
  document.getElementById("searchboxope").style.display = "flex";
}
function searchboxclose(){
  document.getElementById("searchboxope").style.display = "none";
}


function selectSearch(text){
  document.getElementById("searchInput").value = text;

  searchSite();

  document.getElementById("searchboxope").style.display = "none";
}
</script>
</body>
</html>
